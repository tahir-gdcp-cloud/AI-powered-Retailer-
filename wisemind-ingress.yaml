apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wisemind-frontend-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - wisemind.techbitsit.com
    secretName: wisemind-tls-secret  # Cert-manager will create this automatically
  rules:
  - host: wisemind.techbitsit.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-chat-ui
            port:
              number: 80