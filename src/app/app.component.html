<router-outlet></router-outlet>

<!-- Global Logout Confirmation Modal -->
<div *ngIf="authService.isLogoutConfirmOpen()" class="fixed inset-0 z-[1000] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" (click)="authService.cancelLogout()"></div>
  <div
    class="relative bg-[#0f172a] border border-white/10 rounded-2xl p-8 w-full max-w-[400px] shadow-2xl transform scale-100 transition-all text-center">
    
    <div class="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-6">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" class="w-8 h-8">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>

    <h3 class="text-xl font-bold text-white mb-2">Sign out of WiseMind?</h3>
    <p class="text-gray-400 mb-8 text-sm leading-relaxed px-4">You will need to sign in again to access your chat history and research insights.</p>
    
    <div class="flex flex-col gap-3">
      <button (click)="authService.executeLogout()"
        class="w-full py-3.5 rounded-xl bg-red-600 hover:bg-red-700 text-white font-bold text-sm transition-all shadow-lg shadow-red-600/20 active:scale-[0.98]">
        Sign out
      </button>
      <button (click)="authService.cancelLogout()"
        class="w-full py-3.5 rounded-xl bg-white/5 hover:bg-white/10 text-gray-300 font-bold text-sm transition-all active:scale-[0.98]">
        Stay signed in
      </button>
    </div>
  </div>
</div>
