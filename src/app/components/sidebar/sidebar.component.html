<div class="flex flex-col h-full bg-[#070c17] w-full p-3 gap-2 min-w-[256px]">
  <div class="flex items-center gap-2">
    <button (click)="newChat()"
      class="flex flex-1 justify-between items-center bg-transparent p-3 rounded-md hover:bg-slate-800 transition-colors duration-200 text-sm font-medium text-white">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-full bg-white flex items-center justify-center">
          <svg viewBox="0 0 24 24" fill="currentColor" class="text-black w-4 h-4 relative top-[0.5px]">
            <path d="M12 2l2.4 7.6 7.6 2.4-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z" />
          </svg>
        </div>
        New chat
      </div>
      <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
        stroke-linejoin="round" class="h-4 w-4 opacity-70" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
    </button>
    <button (click)="chatService.toggleSidebar()"
      class="p-3 rounded-md hover:bg-slate-800 transition-colors shrink-0 text-white/70 hover:text-white">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="w-5 h-5">
        <path fill-rule="evenodd" clip-rule="evenodd"
          d="M3 6C3 5.44772 3.44772 5 4 5H20C20.5523 5 21 5.44772 21 6C21 6.55228 20.5523 7 20 7H4C3.44772 7 3 6.55228 3 6ZM3 12C3 11.4477 3.44772 11 4 11H20C20.5523 11 21 11.4477 21 12C21 12.5523 20.5523 13 20 13H4C3.44772 13 3 12.5523 3 12ZM4 17C3.44772 17 3 17.4477 3 18C3 18.5523 3.44772 19 4 19H20C20.5523 19 21 18.5523 21 18C21 17.4477 20.5523 17 20 17H4Z"
          fill="currentColor"></path>
      </svg>
    </button>
  </div>

  <div class="flex-col flex-1 overflow-y-auto mt-4 gap-1 flex pb-2 hide-scrollbar">
    <div *ngIf="chatService.sessions().length > 0" class="text-xs text-neutral-500 font-semibold px-3 pb-2 pt-2">History
    </div>
    <div *ngIf="chatService.sessions().length === 0" class="text-xs text-neutral-600 px-3 py-4 italic text-center">No
      recent chats</div>

    <button *ngFor="let session of chatService.sessions()" (click)="loadSession(session.id)"
      [ngClass]="chatService.currentSessionId() === session.id ? 'bg-[#1e293b] text-white' : 'hover:bg-slate-800 text-neutral-300'"
      class="group flex justify-between items-center gap-2 px-3 py-2.5 w-full rounded-md transition-colors duration-200 text-sm text-left">
      <span class="truncate flex-1">{{ session.title }}</span>
      <button (click)="confirmDelete(session.id, $event)" title="Delete Chat"
        class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 text-neutral-500 transition-all shrink-0 rounded hover:bg-black/20">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
      </button>
    </button>
  </div>

  <!-- User Profile Section Bottom -->
  <div
    class="flex items-center gap-3 p-3 w-full rounded-md hover:bg-slate-800 transition-colors duration-200 cursor-pointer mt-auto border-t border-white/10">
    <div class="w-8 h-8 rounded-full bg-[#10a37f] flex items-center justify-center text-white font-bold text-sm">
      U
    </div>
    <div class="text-sm text-white font-medium">User Account</div>
  </div>
</div>
