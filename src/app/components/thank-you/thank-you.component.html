<div class="relative min-h-screen overflow-hidden text-white flex items-center justify-center p-4 sm:p-6">
  <!-- Background -->
  <div class="fixed inset-0">
    <app-network-background></app-network-background>
    <div class="absolute  bg-[#02040d]/90 backdrop-blur-[2px]"></div>
  </div>

  <div class="relative z-10 w-full max-w-lg animate-in fade-in slide-in-from-bottom-4 duration-1000">
    <!-- Main Card -->
    <div
      class="bg-white/[0.03] border border-white/10 backdrop-blur-xl rounded-[2.5rem] p-8 sm:p-12 text-center shadow-2xl relative overflow-hidden">
      <!-- Decorative Background Glow -->
      <div class="absolute -top-24 -left-24 w-48 h-48 bg-teal-500/10 rounded-full blur-[80px]"></div>
      <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-emerald-500/10 rounded-full blur-[80px]"></div>

      <!-- Icon Container -->
      <div class="mb-6 relative inline-flex">
        <div
          class="w-20 h-20 rounded-3xl bg-gradient-to-br from-teal-500/20 to-emerald-500/20 border border-teal-400/20 flex items-center justify-center shadow-inner shadow-white/5">
          <svg class="w-10 h-10 text-teal-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <!-- Sparkles -->
        <div class="absolute -top-2 -right-2 w-6 h-6 text-amber-400 animate-pulse">
          <svg fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2l2.4 7.2h7.6l-6.2 4.5 2.4 7.3-6.2-4.5-6.2 4.5 2.4-7.3-6.2-4.5h7.6z" />
          </svg>
        </div>
      </div>

      <!-- Text Content -->
      <h1 class="text-3xl sm:text-4xl font-black tracking-tight mb-2">
        <span class="bg-gradient-to-r from-teal-300 to-emerald-400 bg-clip-text text-transparent">Thanks for your
          purchase!</span>
      </h1>

      <p class="text-lg font-bold text-white/90 mb-4 tracking-tight">
        Order Placed Successfully
      </p>

      <div class="space-y-4 mb-10">
        <p class="text-sm sm:text-base text-gray-400 leading-relaxed max-w-[280px] sm:max-w-none mx-auto">
          We've sent a <span class="text-teal-400 font-bold">confirmation email</span> to your inbox.
          Your order is being processed with care.
        </p>
      </div>

      <!-- Buttons -->
      <div class="flex flex-col gap-3 max-w-[240px] mx-auto">
        <a routerLink="/chat"
          class="w-full py-4 rounded-2xl bg-gradient-to-r from-teal-500 to-emerald-400 text-xs sm:text-sm font-black text-[#0b1120] shadow-[0_10px_20px_rgba(20,184,166,0.15)] hover:from-teal-400 hover:to-emerald-300 transition-all hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
          </svg>
          CONTINUE TO CHAT
        </a>

        <a routerLink="/dashboard"
          class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 text-xs sm:text-sm font-bold text-white/80 hover:bg-white/10 hover:text-white hover:border-teal-500/30 transition-all flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          VIEW DASHBOARD
        </a>
      </div>

      <!-- Bottom Badge -->
      <div class="mt-12 flex items-center justify-center gap-2">
        <div class="h-[1px] w-8 bg-white/10"></div>
        <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-600">Secure Order Verified</span>
        <div class="h-[1px] w-8 bg-white/10"></div>
      </div>
    </div>
  </div>
</div>
