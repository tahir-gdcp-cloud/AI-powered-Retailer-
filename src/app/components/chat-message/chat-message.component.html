<div class="flex flex-col w-full pb-2">

  <div class="w-full max-w-[800px] mx-auto px-4 md:px-0 flex mb-2"
    [ngClass]="{'justify-end': message.role === 'user', 'justify-start': message.role === 'assistant'}">

    <div *ngIf="message.role === 'assistant'"
      class="w-8 h-8 rounded-full border border-white/20 shrink-0 flex items-center justify-center text-white mr-4 font-bold text-sm shadow-sm mt-0.5"
      style="background-color: transparent">
      <svg viewBox="0 0 24 24" fill="currentColor" class="text-white w-5 h-5">
        <path d="M12 2l2.4 7.6 7.6 2.4-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z" />
      </svg>
    </div>

    <!-- User Message Content Wrapper -->
    <div class="flex flex-col gap-2 transition-all duration-300"
      [ngClass]="!isEditing ? 'max-w-[85%] sm:max-w-[75%]' : 'w-full min-w-0'" *ngIf="message.role === 'user'">
      <!-- View Mode -->
      <div *ngIf="!isEditing"
        class="group relative px-5 py-2.5 bg-white/10 border border-white/20 text-white backdrop-blur-md shadow-lg rounded-3xl text-[15px] leading-relaxed break-words whitespace-pre-wrap font-sans">
        {{ message.content }}

        <!-- Action Buttons (Visible on Hover) -->
        <div
          class="absolute -bottom-10 right-0 flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-10 p-1">
          <button (click)="startEdit()" title="Edit message"
            class="p-1.5 rounded-lg hover:bg-white/10 text-gray-400 hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
            </svg>
          </button>
          <button (click)="copyToClipboard()" [title]="showCopySuccess ? 'Copied!' : 'Copy message'"
            class="p-1.5 rounded-lg hover:bg-white/10 text-gray-400 hover:text-white transition-colors relative">
            <!-- ChatGPT style 'Two Squares' Copy Icon -->
            <svg *ngIf="!showCopySuccess" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
            </svg>
            <svg *ngIf="showCopySuccess" class="w-4 h-4 text-green-400" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Edit Mode -->
      <div *ngIf="isEditing" class="w-full flex flex-col gap-4 min-w-0">
        <textarea [(ngModel)]="editedContent" (input)="onEditInput($event)"
          class="edit-textarea w-full p-4 rounded-2xl bg-[#1e293b]/80 border border-white/20 text-white placeholder-gray-500 focus:outline-none focus:border-teal-500/50 backdrop-blur-xl transition-all resize-none font-sans text-[15px] overflow-hidden"
          style="height: auto; min-height: 100px;" placeholder="Edit your message..."></textarea>
        <div class="flex justify-end gap-2">
          <button (click)="cancelEdit()"
            class="px-4 py-1.5 rounded-full text-xs font-semibold text-gray-300 hover:text-white hover:bg-white/10 transition-all">
            Cancel
          </button>
          <button (click)="saveEdit()"
            class="px-5 py-1.5 rounded-full text-xs font-bold text-white bg-teal-600 hover:bg-teal-500 shadow-lg shadow-teal-500/20 transition-all active:scale-95">
            Send
          </button>
        </div>
      </div>
    </div>

    <!-- Assistant Message View -->
    <div *ngIf="message.role === 'assistant'"
      class="markdown-content max-w-[85%] sm:max-w-[75%] bg-slate-900/40 backdrop-blur-md rounded-3xl text-gray-100 min-w-0 text-[15px] leading-relaxed break-words font-sans shadow-lg"
      [ngClass]="message.content ? 'px-6 py-4' : 'px-4 py-3 w-fit'"
      [class.italic]="message.content.includes('cancelled')"
      [class.text-gray-400]="message.content.includes('cancelled')">

      <!-- Typing Indicator while streaming hasn't yielded content yet -->
      <div *ngIf="!message.content" class="flex items-center text-gray-400/80 h-4">
        <div class="flex gap-1 items-center h-full">
          <span class="w-1.5 h-1.5 rounded-full bg-current animate-bounce" style="animation-delay: 0ms;"></span>
          <span class="w-1.5 h-1.5 rounded-full bg-current animate-bounce" style="animation-delay: 150ms;"></span>
          <span class="w-1.5 h-1.5 rounded-full bg-current animate-bounce" style="animation-delay: 300ms;"></span>
        </div>
      </div>

      <!-- Markdown Content -->
      <div *ngIf="message.content" [innerHTML]="message.content | markdown"></div>
    </div>
  </div>

  <!-- Rich UI: Products Carousel (Constrained) -->
  <div *ngIf="message.products && message.products.length > 0" class="relative group w-full max-w-[800px] mx-auto">
    <!-- Left Navigation Arrow -->
    <button *ngIf="message.products!.length > 2" (click)="scrollCarousel(carousel, -1)"
      class="absolute left-0 md:-left-4 top-1/2 -translate-y-1/2 z-10 w-7 h-7 sm:w-10 sm:h-10 bg-black/60 hover:bg-black/80 backdrop-blur-xl border border-white/20 text-white rounded-full flex items-center justify-center opacity-90 transition-all shadow-xl hover:scale-110 active:scale-95">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
        class="w-3 h-3 sm:w-5 sm:h-5 mr-0.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
      </svg>
    </button>

    <div #carousel (wheel)="onWheel($event, carousel)" (mousedown)="onMouseDown($event, carousel)"
      (mouseleave)="onMouseLeave()" (mouseup)="onMouseUp()" (mousemove)="onMouseMove($event, carousel)"
      class="w-full flex gap-4 overflow-x-auto pb-4 pt-4 hide-scrollbar px-4 md:px-2 cursor-grab active:cursor-grabbing select-none"
      [class.scroll-smooth]="!isDown">

      <div *ngFor="let product of message.products; let first = first; let last = last" [class.ml-auto]="first"
        [class.mr-auto]="last" (click)="handleProductClick($event, product)"
        class="flex-none w-[220px] sm:w-[260px] bg-white/10 backdrop-blur-xl border border-white/20 rounded-xl sm:rounded-2xl p-3 sm:p-4 shadow-lg hover:bg-white/20 hover:border-teal-400/40 transition-all group flex flex-col cursor-pointer">

        <div class="flex justify-between items-start mb-2 sm:mb-3">
          <span
            class="text-[9px] sm:text-[10px] font-bold tracking-wider uppercase text-teal-400 bg-teal-400/10 px-1.5 sm:px-2 py-0.5 rounded-full border border-teal-400/20">
            {{ product.category }}
          </span>
          <span *ngIf="product.in_stock"
            class="flex items-center gap-1.5 text-[10px] sm:text-[11px] text-green-400 font-medium pt-0.5">
            <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse shadow-[0_0_5px_currentColor]"></span> In
            Stock
          </span>
        </div>

        <h4 class="text-[13px] sm:text-[15px] font-semibold text-white mb-1 sm:mb-1.5 leading-snug line-clamp-2"
          [title]="product.product_name">
          {{ product.product_name }}
        </h4>
        <div class="text-[15px] sm:text-[18px] font-bold text-white mb-3 sm:mb-4">
          {{ product.price | currency:'PKR':'symbol-narrow':'1.0-0' }}
        </div>

        <div class="mt-auto pt-2 sm:pt-3 border-t border-white/10">
          <div class="flex items-center gap-2 mb-1 sm:mb-1.5">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-3.5 h-3.5 text-gray-400 shrink-0">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
            <span class="text-[11px] sm:text-[12px] font-medium text-gray-200 truncate" [title]="product.store.name">{{
              product.store.name }}</span>
          </div>
          <div class="flex items-start gap-2">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"
              class="w-3 h-3 sm:w-3.5 sm:h-3.5 text-gray-400 shrink-0 mt-0.5">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="text-[10px] sm:text-[11px] text-gray-400 line-clamp-2 leading-snug">{{ product.store.location
              }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Navigation Arrow -->
    <button *ngIf="message.products!.length > 2" (click)="scrollCarousel(carousel, 1)"
      class="absolute right-0 md:-right-4 top-1/2 -translate-y-1/2 z-10 w-7 h-7 sm:w-10 sm:h-10 bg-black/60 hover:bg-black/80 backdrop-blur-xl border border-white/20 text-white rounded-full flex items-center justify-center opacity-90 transition-all shadow-xl hover:scale-110 active:scale-95">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
        class="w-3 h-3 sm:w-5 sm:h-5 ml-0.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path>
      </svg>
    </button>
  </div>

</div>
