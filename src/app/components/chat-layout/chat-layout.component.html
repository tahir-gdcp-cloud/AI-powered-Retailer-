<div class="fixed inset-0 flex animate-gradient-bg text-gray-100 overflow-hidden font-sans">
  <app-network-background></app-network-background>
  <!-- Mobile Backdrop Overlay -->
  <div *ngIf="chatService.isSidebarOpen()" (click)="chatService.toggleSidebar()"
    class="fixed inset-0 bg-black/60 z-50 md:hidden transition-opacity cursor-pointer">
  </div>

  <app-sidebar
    class="flex flex-col bg-[#171717] transition-all duration-300 transform fixed inset-y-0 left-0 z-[60] md:relative"
    [ngClass]="chatService.isSidebarOpen() ? 'w-[75vw] sm:w-64 border-r border-white/5 opacity-100 translate-x-0 shadow-2xl md:shadow-none' : 'w-0 border-none opacity-0 -translate-x-full overflow-hidden'">
  </app-sidebar>

  <div class="flex-1 flex flex-col h-full relative min-w-0 overflow-hidden w-full">
    <!-- Unified Top Header bar -->
    <header class="flex-none h-[64px] flex items-center justify-between px-4 sm:px-6 w-full z-50 bg-transparent">
      <!-- Left side (Toggle) -->
      <div class="flex items-center w-10">
        <button *ngIf="!chatService.isSidebarOpen()" (click)="chatService.toggleSidebar()"
          class="p-2 -ml-2 rounded-md hover:bg-[#2f2f2f] transition-colors focus:outline-none text-white/70 hover:text-white group relative">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="w-5 h-5">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M3 6C3 5.44772 3.44772 5 4 5H20C20.5523 5 21 5.44772 21 6C21 6.55228 20.5523 7 20 7H4C3.44772 7 3 6.55228 3 6ZM3 12C3 11.4477 3.44772 11 4 11H20C20.5523 11 21 11.4477 21 12C21 12.5523 20.5523 13 20 13H4C3.44772 13 3 12.5523 3 12ZM4 17C3.44772 17 3 17.4477 3 18C3 18.5523 3.44772 19 4 19H20C20.5523 19 21 18.5523 21 18C21 17.4477 20.5523 17 20 17H4Z"
              fill="currentColor"></path>
          </svg>
          <div
            class="absolute left-10 top-1/2 -translate-y-1/2 bg-black text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap transition-opacity text-medium pointer-events-none z-50 shadow-md border border-white/10">
            Open sidebar
          </div>
        </button>
      </div>

      <!-- Right side (Auth) -->
      <div class="flex items-center gap-2 pr-2">
        <!-- Guest Buttons -->
        <ng-container *ngIf="!authService.isLoggedIn()">
          <button [routerLink]="['/login']"
            class="hidden sm:block px-4 py-2 text-sm font-medium text-gray-300 hover:text-white hover:bg-white/10 rounded-full transition-all duration-300">
            Sign in
          </button>
          <button [routerLink]="['/login']"
            class="px-5 py-2 text-sm font-bold text-white bg-white/10 backdrop-blur-md border border-white/20 hover:border-teal-400/60 hover:bg-white/20 hover:text-teal-400 hover:shadow-[0_0_15px_rgba(45,212,191,0.3)] rounded-full transition-all duration-300 shadow-lg tracking-wide">
            Sign up
          </button>
        </ng-container>

        <!-- Authenticated Buttons -->
        <ng-container *ngIf="authService.isLoggedIn()">
          <a *ngIf="hasOrders()" [routerLink]="['/dashboard']"
            class="px-4 py-2 text-sm font-bold text-teal-300 bg-teal-400/10 backdrop-blur-md border border-teal-400/20 hover:border-teal-400/60 hover:bg-teal-400/20 hover:shadow-[0_0_15px_rgba(45,212,191,0.3)] rounded-full transition-all duration-300 shadow-lg tracking-wide mr-2">
            Dashboard
          </a>
          <!-- <button (click)="logout()"
            class="px-3 py-1 text-sm  text-white bg-red-500/10 backdrop-blur-md border border-red-500/20 hover:border-red-400/60 hover:bg-red-500/20 hover:text-red-400 hover:shadow-[0_0_15px_rgba(239,68,68,0.3)] rounded-md transition-all duration-300 shadow-lg tracking-wide">
            Sign Out
          </button> -->
        </ng-container>
      </div>
    </header>

    <app-chat-main *ngIf="!chatService.selectedProduct()"
      class="flex-1 flex flex-col min-h-0 w-full min-w-0 relative"></app-chat-main>
    <app-product-details *ngIf="chatService.selectedProduct()"
      class="flex-1 flex flex-col min-h-0 w-full min-w-0 relative"></app-product-details>
  </div>
</div>

<!-- Global Delete Confirmation Modal -->
<div *ngIf="chatService.sessionToDelete()" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" (click)="chatService.cancelDelete()"></div>
  <div
    class="relative bg-[#0f172a] border border-white/10 rounded-2xl p-6 w-full max-w-[360px] shadow-2xl transform scale-100 transition-all">
    <h3 class="text-lg font-semibold text-white mb-2">Delete conversation?</h3>
    <p class="text-sm text-gray-400 mb-6">This will permanently delete the conversation from your history.</p>
    <div class="flex justify-end gap-3 font-medium">
      <button (click)="chatService.cancelDelete()"
        class="px-4 py-2 rounded-lg text-sm text-white bg-slate-700 hover:bg-slate-600 transition-colors">Cancel</button>
      <button (click)="chatService.executeDelete()"
        class="px-4 py-2 rounded-lg text-sm bg-red-600 hover:bg-red-700 text-white shadow-sm transition-colors">Delete</button>
    </div>
  </div>
</div>

<!-- Login Success Toaster -->
<div *ngIf="showLoginToast()" class="fixed top-4 left-1/2 -translate-x-1/2 sm:translate-x-0 sm:left-auto sm:top-6 sm:right-6 z-[200] w-[90%] sm:w-full max-w-sm rounded-xl border border-teal-400/40 bg-[#0b1120]/95 p-3 shadow-[0_8px_30px_rgb(0,0,0,0.12)] backdrop-blur-xl transition-all duration-500 ease-out flex items-center gap-3">
  <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-teal-500/20 text-teal-400 border border-teal-500/30">
    <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
    </svg>
  </div>
  <div class="flex-1">
    <p class="text-sm font-bold text-white">Successfully logged in!</p>
    <p class="text-[11px] text-teal-200/80">Welcome back, {{ authService.userName() }}</p>
  </div>
  <button (click)="showLoginToast.set(false)" class="shrink-0 text-gray-500 hover:text-white transition-colors">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
</div>
